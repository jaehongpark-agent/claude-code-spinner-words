name: Test Anthropic API

on:
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Claude auth
        run: echo "${{ secrets.CLAUDE_SETUP_TOKEN }}" | claude setup-token

      - name: Test claude -p
        run: claude -p "Say hello in Korean, one sentence only."
