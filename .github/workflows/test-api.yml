name: Test Anthropic API

on:
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Claude auth
        run: |
          echo "${{ secrets.CLAUDE_SETUP_TOKEN }}" | npx @anthropic-ai/claude-code setup-token

      - name: Test claude -p
        run: |
          npx @anthropic-ai/claude-code -p "Say hello in Korean, one sentence only."
